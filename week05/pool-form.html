<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="">
        <meta name="author" content="Brady Burgener">
        <title>WDD130 | Brady Burgener | HTML Form - User Poll</title>
        <link rel="stylesheet" href="./styles/poll-form.css">
    </head>
    <body>
        <header>
            <h1>WDD 130 | Brady Burgener | HTML Form - User Poll</h1>
        </header>
        <main>
            <form action="">
                <fieldset>
                    <legend>Contact Information</legend>
                    <div class="form-item column2">
                        <label for="fullname">Full Name:</label>
                        <input type="text" name="fullname" id="fullname"><br>
                    </div>
                    <div class="form-item column2">
                        <label for="useremail">Email:</label>
                        <input type="email" name="useremail" id="useremail"><br>
                    </div>
                </fieldset>
                <fieldset>
                    <legend>Questions</legend>
                    <div class="form-item column1">
                        <label for="browser">What is your favorite internet browser?</label>
                        <select name="browser" id="browser">
                            <option value="chrome">Google Chrome</option>
                            <option value="firefox">Firefox</option>
                            <option value="edge">Microsoft Edge</option>
                            <option value="duck">DuckDuckGo</option>
                            <option value="safari">Safari</option>
                            <option value="brave">Brave</option>
                            <option value="opera">Opera</option>
                            <option value="other">Other</option>
                        </select><br>
                    </div>
                    <div class="form-item column1">
                        <label for="pet">Do you have a household pet?</label>
                        <input type="checkbox" name="pet" id="pet"><br>
                    </div>
                    <label for="feedback" class="center">List the places you have lived:</label>
                    <textarea name="feedback" id="feedback" rows="4" placeholder="Idaho Falls Idaho, Orem Utah, New York New York"></textarea>
                </fieldset>
                <button type="submit" class="button">Submit Poll</button>
            </form>
        </main>
        <footer>
            <p>&copy;2025 | HTML Form - User Poll Activity | Brady Burgener</p>
        </footer>
    </body>
</html>
